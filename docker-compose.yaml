# Idle syncmgr supervisor. Deploy a pipeline against existing DBs with:
#
#   docker compose up -d
#   docker compose exec syncmgr syncmgr deploy \
#     -c /config/connection.yaml -m /config/mapping.yaml
#
# Or from the host (port 9405 published):
#   ./cli/build/install/syncmgr/bin/syncmgr deploy \
#     -c examples/postgres-to-couchbase/connection.yaml \
#     -m examples/postgres-to-couchbase/mapping.yaml \
#     --url http://127.0.0.1:9405
#
# Control API: /health /status /deploy /pipeline/stop /metrics

services:
  syncmgr:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: syncmgr
    environment:
      # Provide source/target secrets in the environment before deploy
      PG_CDC_PASSWORD: ${PG_CDC_PASSWORD:-}
      ORACLE_CDC_PASSWORD: ${ORACLE_CDC_PASSWORD:-}
      MSSQL_CDC_PASSWORD: ${MSSQL_CDC_PASSWORD:-}
      CB_PASSWORD: ${CB_PASSWORD:-}
    volumes:
      - ./examples:/config:ro
      - ./data/offsets:/data/offsets
      - ./data/schema-history:/data/schema-history
      - ./data/dlq:/data/dlq
      - ./data/config:/data/config
    ports:
      - "9405:9405"
    networks:
      - sync-network
    command:
      - run
      - --bind
      - 0.0.0.0
      - --port
      - "9405"
      - --config-dir
      - /data/config
    healthcheck:
      test: ["CMD", "/app/bin/syncmgr", "status", "--url", "http://127.0.0.1:9405"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

networks:
  sync-network:
    name: sync-network
    driver: bridge
